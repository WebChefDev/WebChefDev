<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tic Tac Toe</title>
    <style>
      body {
        background-image: linear-gradient(
          to right top,
          #d16ba5,
          #c777b9,
          #ba83ca,
          #aa8fd8,
          #9a9ae1,
          #8aa7ec,
          #79b3f4,
          #69bff8,
          #52cffe,
          #41dfff,
          #46eefa,
          #5ffbf1
        );
        font-family: "Lucida Sans", "Lucida Sans Regular", "Lucida Grande",
          "Lucida Sans Unicode", Geneva, Verdana, sans-serif;
        height: 100vh;
        text-align: center;
      }
      .game-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        margin-top: 150px;
      }
      .board {
        display: grid;
        grid-template-columns: 100px 100px 100px;
        gap: 5px;
      }
      .cell {
        background-color: aliceblue;
        width: 100px;
        height: 100px;
        text-align: center;
        border: 1px solid black;
        font-size: 100px;
      }
      .modal {
        display: none;
        position: fixed;
        z-index: 1;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        overflow: auto;
        background-color: black;
      }
      .modal-content {
        background-color: #fefefe;
        margin: 15% auto;
        padding: 20px;
        border: 1px solid #888;
        width: 30%;
        text-align: center;
      }
      .close-btn {
        color: #aaa;
        float: right;
        font-size: 28px;
        font-weight: bold;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="game-container">
      <div class="play">
        <h1>🕹️Let's Play a Game🕹️</h1>
        <p>
          Hi, welcome to the <i>least</i> fun game ever!<br /><br>
          This game uses the
          <a href="https://en.wikipedia.org/wiki/Minimax"> minimax</a> algorithm
          which makes it unbeatable.<br /><br>The best you can hope for is a draw!
        </p>
      </div>
      <div class="board">
        <div class="cell" data-index="0"></div>
        <div class="cell" data-index="1"></div>
        <div class="cell" data-index="2"></div>
        <div class="cell" data-index="3"></div>
        <div class="cell" data-index="4"></div>
        <div class="cell" data-index="5"></div>
        <div class="cell" data-index="6"></div>
        <div class="cell" data-index="7"></div>
        <div class="cell" data-index="8"></div>
      </div>
      <p id="status"></p>
    </div>
    <div id="gameModal" class="modal">
      <div class="modal-content">
        <span class="close-btn">&times;</span>
        <p id="modalMessage">Better Luck Next Time!</p>
      </div>
    </div>
    <script>
      let cells = document.querySelectorAll(".cell");
      let currentPlayer = "X";
      let board = Array(9).fill("");
      let isGameOver = false;
      const winningCombos = [
        [0, 1, 2],
        [3, 4, 5],
        [6, 7, 8],
        [0, 3, 6],
        [1, 4, 7],
        [2, 5, 8],
        [0, 4, 8],
        [2, 4, 6],
      ];

      cells.forEach((cell) => {
        cell.addEventListener("click", function (e) {
          if (cell.textContent === "" && !isGameOver) {
            cell.textContent = currentPlayer;
            board[cell.dataset.index] = currentPlayer;

            if (checkWinner(currentPlayer)) {
              showModal(`${currentPlayer} Wins!`);
              isGameOver = true;
            } else if (board.every((cell) => cell !== "")) {
              showModal("It's a draw!");
              isGameOver = true;
            } else if (currentPlayer === "X") {
              currentPlayer = "O";
              makeAiMove();
            }
          }
        });
      });

      function checkWinner(player) {
        return winningCombos.some((combination) => {
          return combination.every((index) => {
            return board[index] === player;
          });
        });
      }

      function makeAiMove() {
        let bestMove = minimax(board, "O").index;
        board[bestMove] = "O";
        cells[bestMove].textContent = "O";

        if (checkWinner("O")) {
          showModal(`O Wins!`);
          isGameOver = true;
        } else if (board.every((cell) => cell !== "")) {
          showModal("It's a draw!");
          isGameOver = true;
        } else {
          currentPlayer = "X";
        }
      }

      function minimax(newBoard, player) {
        const availableMoves = getAvailableMoves(newBoard);

        if (checkWinner("O")) {
          return { score: -10 };
        } else if (checkWinner("X")) {
          return { score: 10 };
        } else if (availableMoves.length === 0) {
          return { score: 0 };
        }

        let moves = [];
        for (let i = 0; i < availableMoves.length; i++) {
          let move = {};
          move.index = availableMoves[i];
          newBoard[availableMoves[i]] = player;

          if (player === "X") {
            let g = minimax(newBoard, "O");
            move.score = g.score;
          } else {
            let g = minimax(newBoard, "X");
            move.score = g.score;
          }

          newBoard[availableMoves[i]] = "";
          moves.push(move);
        }

        let bestMove;
        if (player === "X") {
          let bestScore = -Infinity;
          for (let i = 0; i < moves.length; i++) {
            if (moves[i].score > bestScore) {
              bestScore = moves[i].score;
              bestMove = i;
            }
          }
        } else {
          let bestScore = Infinity;
          for (let i = 0; i < moves.length; i++) {
            if (moves[i].score < bestScore) {
              bestScore = moves[i].score;
              bestMove = i;
            }
          }
        }
        return moves[bestMove];
      }

      function getAvailableMoves(board) {
        let moves = [];
        for (let i = 0; i < board.length; i++) {
          if (board[i] === "") moves.push(i);
        }
        return moves;
      }

      function resetGame() {
        board = Array(9).fill("");
        cells.forEach((cell) => {
          cell.textContent = "";
        });
        currentPlayer = "X";
        isGameOver = false;
        modal.style.display = "none";
      }

      var modal = document.getElementById("gameModal");
      var span = document.getElementsByClassName("close-btn")[0];

      function showModal(message) {
        document.getElementById("modalMessage").textContent = message;
        modal.style.display = "block";
      }

      span.onclick = function () {
        modal.style.display = "none";
        resetGame(); // Reset the game when the modal is closed
      };
    </script>
  </body>
</html>
